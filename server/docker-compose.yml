services:
  postgres:
    image: postgres:16-alpine
    container_name: dissertation-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dissertation
      POSTGRES_PASSWORD: dissertation
      POSTGRES_DB: dissertation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dissertation -d dissertation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
