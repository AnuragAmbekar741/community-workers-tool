# Render Blueprint — https://render.com/docs/blueprint-spec
# Apply via Dashboard → Blueprints, or match these settings on the existing web service.
services:
  - type: web
    name: community-workers-tool
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm ci --include=dev && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
